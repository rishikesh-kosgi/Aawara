apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

import java.util.Properties

react {
    autolinkLibrariesWithApp()
}

project.ext.vectoricons = [
    iconFontNames: [ 'MaterialCommunityIcons.ttf' ]
]
apply from: file("../../node_modules/react-native-vector-icons/fonts.gradle")

def enableProguardInReleaseBuilds = true
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("keystore.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def releaseStoreFile = keystoreProperties["RELEASE_STORE_FILE"] ?: project.findProperty("RELEASE_STORE_FILE")
def releaseStorePassword = keystoreProperties["RELEASE_STORE_PASSWORD"] ?: project.findProperty("RELEASE_STORE_PASSWORD")
def releaseKeyAlias = keystoreProperties["RELEASE_KEY_ALIAS"] ?: project.findProperty("RELEASE_KEY_ALIAS")
def releaseKeyPassword = keystoreProperties["RELEASE_KEY_PASSWORD"] ?: project.findProperty("RELEASE_KEY_PASSWORD")
def hasReleaseSigning = releaseStoreFile && releaseStorePassword && releaseKeyAlias && releaseKeyPassword

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'
def buildingAppBundle = gradle.startParameter.taskNames.any { it.toLowerCase().contains("bundle") }

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.touristspot"
    defaultConfig {
        applicationId "com.touristspot"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        resValue "string", "google_maps_api_key", (keystoreProperties["GOOGLE_MAPS_API_KEY"] ?: project.findProperty("GOOGLE_MAPS_API_KEY") ?: "")
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    splits {
        abi {
            enable !buildingAppBundle
            reset()
            include "armeabi-v7a", "arm64-v8a"
            universalApk false
        }
    }
    packaging {
        resources {
            excludes += [
                "META-INF/**",
                "**/attach_hotspot_windows.dll",
            ]
        }
    }
    lint {
        abortOnError false
        checkReleaseBuilds false
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders = [usesCleartextTraffic: "true"]
        }
        release {
            signingConfig hasReleaseSigning ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            manifestPlaceholders = [usesCleartextTraffic: "false"]
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
